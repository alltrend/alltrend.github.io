  let currentPage = 1;
  const poemsPerPage = 10;

  function renderPoems() {
    const list = document.getElementById("poemList");
    list.innerHTML = "";
    const start = (currentPage - 1) * poemsPerPage;
    const end = start + poemsPerPage;
    const pagePoems = poems.slice(start, end);

    pagePoems.forEach((poem, index) => {
      list.innerHTML += `
        <div class="poem">
          <h3>${poem.title}</h3>
          <p>${poem.content}</p>
          <button onclick="editPoem(${start+index})">編輯</button>
          <button onclick="deletePoem(${start+index})">刪除</button>
        </div>
      `;
    });

    const pageInfo = `第 ${currentPage} 頁 / 共 ${Math.ceil(poems.length / poemsPerPage)} 頁`;
    document.getElementById("pageInfoTop").innerText = pageInfo;
    document.getElementById("pageInfoBottom").innerText = pageInfo;

    localStorage.setItem("poems", JSON.stringify(poems));
  }

  function addPoem() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;
    if(title && content){
      poems.unshift({title, content});
      renderPoems();
      document.getElementById("title").value="";
      document.getElementById("content").value="";
    }
  }

  function editPoem(index) {
    const newTitle = prompt("修改標題：", poems[index].title);
    const newContent = prompt("修改內容：", poems[index].content);
    if(newTitle && newContent){
      poems[index] = {title:newTitle, content:newContent};
      renderPoems();
    }
  }

  function deletePoem(index) {
    poems.splice(index,1);
    if(currentPage > Math.ceil(poems.length / poemsPerPage)) currentPage--;
    renderPoems();
  }

  function clearAll() {
    if(confirm("確定要清除全部詩嗎？")){
      poems = [];

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createParticles(){
  particles = []; // 清空舊的粒子
  for(let i=0; i<90; i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*23+13,
      color: `hsla(${Math.random()*360}, 70%, 60%, ${0.2 + Math.random()*0.3})`,
      speedX: (Math.random()-0.5)*0.5,
      speedY: (Math.random()-0.5)*0.5
    });
  }
}

function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 40;
    ctx.shadowColor = p.color;
    ctx.fill();

    p.x += p.speedX;
    p.y += p.speedY;

    if(p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if(p.y < 0 || p.y > canvas.height) p.speedY *= -1;
  });
}

function animate(){
  drawParticles();
  requestAnimationFrame(animate);
}

createParticles();
animate();

// ⭐ 視窗改變 → 重設畫布 + 粒子重分佈
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  createParticles(); // 重新分佈粒子
}

window.addEventListener("resize", resizeCanvas);
