<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>CVD → TXT 轉換工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    .dropzone { border: 2px dashed #999; padding: 2rem; text-align: center; }
    .file { display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px solid #eee; }
    button { padding: 0.5rem 1rem; margin: 0.25rem; }
    #error { color: red; margin-top: 1rem; }
    
    
  body {
  background: linear-gradient(135deg, #f0f7ff, #e2ecf5);
}
h1 {
  color: #0066cc;
  text-shadow: 1px 1px 2px #ccc;
}
.item {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.item:hover {
  transform: translateY(-3px);
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}
  </style>
  
</head>
<body>
  <h1>CVD → TXT 轉換工具</h1>
  <div class="dropzone" id="dropzone">
    拖放 .cvd 檔案到這裡，或 <input type="file" id="file" accept=".cvd,.cld" />
  </div>
  <div id="info"></div>
  <div id="list"></div>
  <button id="mergeAll" disabled>合併輸出 rules.txt</button>
  <div id="error"></div>

  <!-- 本地引用 -->
  <script src="./libs/pako.min.js"></script>
  <script src="./libs/untar.js"></script>
  <script type="module" src="./cvd.js"></script>
</body>
</html>
