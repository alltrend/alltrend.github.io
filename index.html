<style>
:root{
  --accent:#66d9ff;
  --text:#eaf2ff;
  --hue:0; /* 初始色相 */
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;width:100%;
  overflow-x:hidden;overflow-y:auto;
  font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
  color:var(--text);

/* 粒子背景 */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* 中央光暈（自然冷色呼吸版） */
.ellipse {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 70vw;
  height: 70vw;
  max-width: 1000px;
  max-height: 1000px;
  border-radius: 50%;
  background:
    radial-gradient(circle at center,
      rgba(120,170,255,0.95) 0%,
      rgba(120,140,255,0.75) 22%,
      rgba(180,120,255,0.55) 45%,
      rgba(255,120,220,0.28) 65%,
      rgba(10,20,40,0.05) 85%,
      transparent 100%);
  box-shadow:
    0 0 120px rgba(120,170,255,0.35),
    0 0 240px rgba(180,120,255,0.22),
    0 0 360px rgba(255,120,220,0.12);
  transform: translate(-50%, -50%) scale(1);
  opacity: 0.9;
  filter: blur(24px);
  animation:
    ellipseBreath 10s ease-in-out infinite,
    colorShift 18s ease-in-out infinite;
  z-index: 1;
  pointer-events: none;
}

/* 呼吸 */
@keyframes ellipseBreath {
  0%,100%{
    transform:translate(-50%,-50%) scale(0.75);
    opacity:0.72;
    filter:blur(28px);
  }

  50%{
    transform:translate(-50%,-50%) scale(1.45);
    opacity:1;
    filter:blur(10px);
  }
}

/* 顏色微變化（不經過綠色） */
@keyframes colorShift {
  0%{
    background:
      radial-gradient(circle at center,
        rgba(120,170,255,0.95) 0%,
        rgba(120,140,255,0.75) 22%,
        rgba(180,120,255,0.55) 45%,
        rgba(255,120,220,0.28) 65%,
        rgba(10,20,40,0.05) 85%,
        transparent 100%);
  }
  50%{
    background:
      radial-gradient(circle at center,
        rgba(150,120,255,0.95) 0%,
        rgba(120,160,255,0.72) 25%,
        rgba(220,120,255,0.5) 48%,
        rgba(255,140,200,0.22) 68%,
        rgba(10,20,40,0.05) 85%,
        transparent 100%);
  }
  100%{
    background:
      radial-gradient(circle at center,
        rgba(120,170,255,0.95) 0%,
        rgba(120,140,255,0.75) 22%,
        rgba(180,120,255,0.55) 45%,
        rgba(255,120,220,0.28) 65%,
        rgba(10,20,40,0.05) 85%,
        transparent 100%);
  }
}

/* 頂部導覽列 */
header {
  position: fixed;
  top: 0; left: 0; width: 100%;
  background: transparent;   /* 改成全透明 */
  backdrop-filter: blur(6px); /* 保留模糊效果 */
  display: flex; justify-content: center; align-items: center;
  padding: 0 20px; z-index: 10;
}

header h1 {
  filter: blur(0.3px); /* 讓文字本身模糊 */
  font-size: 48px;
  margin-right: 10px;
  margin-bottom: 10px; /* 縮短與底下的距離 */
  line-height: 1.2;    /* 調整行高，避免太鬆 */
  animation: rainbowCycle 18s linear infinite; /* 18秒循環 */
  text-shadow: 
    0 0 20px currentColor,     
    0 0 40px currentColor,   
    0 0 80px currentColor,
    0 0 160px currentColor,   
    0 0 240px currentColor;  
}
/* 保持原本的導覽列樣式 */
nav ul {
  list-style: none;
  display: flex;
  gap: 20px;
}
nav a {
  color: var(--text); /* 固定文字顏色，不受動畫影響 */
  text-decoration: none;
  font-weight: 500;
  transition: color 0.3s, text-shadow 0.3s;
}
nav a:hover {
  color: var(--accent);
  text-shadow: 
    0 0 15px rgba(102,217,255,0.9),
    0 0 30px rgba(102,217,255,0.7),
    0 0 60px rgba(102,217,255,0.5);
}
@keyframes rainbowCycle {
  0%   { color: #ff6666; }   /* 淺紅 */
  5%   { color: #ff9966; }   /* 橘粉 */
  10%  { color: #ffcc66; }   /* 金黃 */
  15%  { color: #ffee66; }   /* 淺黃 */
  20%  { color: #ff66aa; }   /* 桃紅 */
  25%  { color: #ff99cc; }   /* 粉紅 */
  30%  { color: #ffccff; }   /* 淡粉紫 */
  35%  { color: #cc99ff; }   /* 淺紫 */
  40%  { color: #b3c6ff; }   /* 淡藍紫 (比9999ff更亮) */
  45%  { color: #99ccff; }   /* 淺亮藍 */
  50%  { color: #aaddff; }   /* 天空藍 (取代偏暗6699ff) */
  55%  { color: #cceeff; }   /* 淡冰藍 (取代偏綠66ffff) */
  60%  { color: #99ffff; }   /* 冰藍 */
  65%  { color: #ccffff; }   /* 淺水藍 */
  70%  { color: #e6ffff; }   /* 幾乎白的藍 */
  75%  { color: #ffccdd; }   /* 淡粉白 */
  80%  { color: #ffddee; }   /* 淡紫粉 */
  85%  { color: #ffeeff; }   /* 淡紫白 */
  90%  { color: #fff0f5; }   /* 淺玫瑰白 */
  95%  { color: #ffe6f2; }   /* 淡粉白亮色 */
  100% { color: #ff6666; }   /* 回到淺紅 */
}

/* 主要容器置中 */
.container {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 3vh;
  align-items: center;
  justify-content: flex-start;
  padding: 45px 20px 40px 20px;
  max-width: 1200px;

}

/* 區塊標題 */
.title {

  letter-spacing: .05em;

  margin-bottom: 10px; /* 與下面元素保持適度距離 */

  font-size: 36px;

/* Grid 卡片 */
.grid {
  width: 100%;
  max-width: 1000px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;       /* ✅ 保留換行 */
  justify-content: center;
  gap: 18px;
}
.card{
  flex: 1 1 23%;         /* ✅ 每行最多四個卡片 */
  min-width: 200px;      /* ✅ 保證不會太窄 */
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  min-height:90px;
  border-radius:14px;
  background: rgba(255,255,255,0.08);
  color:var(--text);
  text-decoration:none;
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow:6px 6px 15px rgba(0,0,0,0.3), -6px -6px 15px rgba(255,255,255,0.1);
}
.card:hover{
  transform:scale(1.05);
  box-shadow:6px 6px 25px rgba(102,217,255,0.4), -6px -6px 25px rgba(102,217,255,0.2);
}
.card:active{
  transform:scale(0.95);
  box-shadow:inset 6px 6px 15px rgba(0,0,0,0.3), inset -6px -6px 15px rgba(255,255,255,0.1);
}


html, body, header, .title {

  padding: 0 !important;
}


/* Reset */
html,body {
height:100%;

/* 小型手機（小於 480px） */
@media (max-width: 479px) {

  }

  .grid {

  .card {

/* 中型手機（480px 到 767px） */

/* 平板（768px 到 1023px） */

  }
}

<script>
// 多彩漸變粒子動畫 + 光暈 + 自適應
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
let globalHue = 0; // 全域色相，隨時間增加

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initParticles();
}
window.addEventListener('resize', resize);

// 根據螢幕大小自適應粒子數量與大小
function initParticles() {
  particles = [];
  const baseNum = 50;
  const scaleFactor = Math.min(W, H) / 500;
  const NUM = Math.floor(baseNum * scaleFactor * 1.5); // 桌機多、手機少

  for (let i = 0; i < NUM; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: (1 + Math.random() * 2) * (6 * scaleFactor),
      dx: (Math.random() - 0.5) * 1.5,
      dy: (Math.random() - 0.5) * 1.5,
      offset: Math.random() * 360 // 每顆粒子色相偏移
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  globalHue += 0.5; // 每次刷新增加色相
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    const hue = (globalHue + p.offset) % 360;
    ctx.fillStyle = `hsl(${hue}, 70%, 60%)`;
    ctx.shadowBlur = 30;          // 光暈效果
    ctx.shadowColor = ctx.fillStyle;
    ctx.fill();
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0 || p.x > W) p.dx *= -1;
    if (p.y < 0 || p.y > H) p.dy *= -1;
  }
  requestAnimationFrame(draw);
}
resize();
draw();
</script>
