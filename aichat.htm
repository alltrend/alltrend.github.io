<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<style>
    body {
      margin: 0;
      background-color: #005FAF; /* 深藍背景 */
      font-family: Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding-top: 30px;
    }
    .btn {
      background: linear-gradient(
        270deg,
        #001f4d, #003366, #004b97, #0066cc, #3399ff,
        #6633cc, #9900cc, #cc00ff, #00cccc, #00ff99,
        #004b97, #001f4d
      );
      background-size: 2000% 2000%; /* 放大漸層，方便流動 */
      color: #fff;
      border: none;
      padding: 15px 30px;
      margin: 10px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: box-shadow 0.3s;
      display: block;
      width: 250px;
      text-align: center;
      animation: rainbow 15s linear infinite; /* 多彩漸層自動流動 */
    }
    /* 滑鼠移過去：光暈 + 彈跳 */
    .btn:hover {
      box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 15px rgba(255,255,255,0.5);
      animation: rainbow 15s linear infinite, bounce 0.4s ease;
    }
    /* 按下去：縮小 */
    .btn:active {
      transform: scale(0.95);
    }
    /* 多彩漸層流動動畫 */
    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* 彈跳動畫 */
    @keyframes bounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.1); }
      50%  { transform: scale(0.95); }
      70%  { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
</style>
</head>
<body>
