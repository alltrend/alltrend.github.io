 }
button { background:#444; color:#fff; border:none; }


#commentsContainer {

  margin: 0 auto;
  border: 1px solid #ccc;

  transition: max-height 0.5s ease;
  overflow: auto;
  max-height: 600px;   /* 初始摺疊高度 */
}

#toggle:checked ~ #commentsContainer {
  max-height: 2000px;  /* 展開後高度 */
}


html, body, header, .title {
  margin: 0 !important;
  padding: 0 !important;
}


/* Reset */
html,body {
height:100%;
  overflow-x: hidden;   /* 禁止橫向滾動 */
  overflow-y: auto;     /* ✅ 允許垂直滾動 */
}


/* 📱 小型手機（小於 480px） */
@media (max-width: 479px) {
  .toolbar {
    flex-direction: column;
    gap: 6px;
  }
  .toolbar select,
  .toolbar input,
  .toolbar button {
    width: 100%;
  }
  table {
    font-size: 13px;
  }
  #container {
    grid-template-columns: 1fr;
  }
  #sidebar {
    position: absolute;
    top: 42px;
    left: 0;
    right: 0;
    height: 40%;
    background: #fff;
    z-index: 1000;
    border-right: none;
    border-top: 1px solid #ddd;
  }
  #map {
    height: calc(100vh - 42px);
  }
  header > * {
    flex: 1 1 100%;
  }
}
/* 📱 中型手機（480px 到 767px） */
@media (min-width: 480px) and (max-width: 767px) {

// 網路 JSON URL (可改成你 Netlify 的 JSON endpoint)
const jsonURL = "https://你的網路站/messages.json";

// 保存本機
function saveLocal(){
  localStorage.setItem("aiComments", JSON.stringify(comments));
}

// 嘗試抓取網路 JSON
async function fetchNetworkComments(){
  try {
    const res = await fetch(jsonURL);
    if(res.ok){
      const data = await res.json();
      // 合併網路與本機資料
      mergeComments(data);
      saveLocal();
      displayComments();
    }
  } catch(e){ console.log("網路 JSON 無法抓取，本機資料使用中"); }
}

// 合併資料，避免重複 id
function mergeComments(networkComments){
  const existingIds = new Set(comments.map(c=>c.id));
  networkComments.forEach(c=>{
    if(!existingIds.has(c.id)) comments.push(c);
  });
}

// 更新網路 JSON
async function updateNetworkComments(){
  try {
    await fetch(jsonURL, {
      method: "POST", // 或 PUT，取決於後端設定
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(comments)
    });
  } catch(e){ console.log("網路 JSON 無法更新"); }
}

// 排序模式
function setSortMode(mode){
  sortMode = mode;
  displayComments();
}

// 投票
function voteComment(id){
  function findComment(cList){
    for(let c of cList){
      if(c.id===id){ c.votes++; return true; }
      if(c.replies.length && findComment(c.replies)) return true;
    }
    return false;
  }
  findComment(comments);
  saveLocal();
  updateNetworkComments();
  displayComments();
}

// 新增留言
function addNewComment(){
  const txt = document.getElementById("newCommentText").value.trim();
  if(txt==="") return;
  const newComment = {id: Date.now(), text: txt, votes:0, replies:[]};
  comments.push(newComment);
  document.getElementById("newCommentText").value="";
  saveLocal();
  updateNetworkComments();
  displayComments();
}

// 清除留言
function clearComments(){
  if(confirm("確定要清除所有留言嗎？")) {
    comments = [];
    localStorage.removeItem("aiComments");
    updateNetworkComments();
    displayComments();
  }
}

// 渲染留言
function renderComments(parentDiv, commentList){
  let sortedComments = [...commentList];
  if(sortMode==="hot"){
    sortedComments.sort((a,b)=>b.votes - a.votes);
  } else {
    sortedComments.sort((a,b)=>b.id - a.id);
  }

  sortedComments.forEach(c=>{
    const div = document.createElement("div");
    div.className="comment";
    div.style.background = colors[Math.floor(Math.random()*colors.length)];
    div.innerHTML = `💬 ${c.text} <span>👍 ${c.votes}</span> <span class="vote" onclick="voteComment(${c.id})">投票</span>`;

    const replyBox = document.createElement("div");
    replyBox.className="reply-box";
    const textarea = document.createElement("textarea");
    textarea.placeholder = "回覆這則留言...";
    const btn = document.createElement("button");
    btn.textContent = "送出回覆";
    btn.onclick = ()=>{
      const val = textarea.value.trim();
      if(val==="") return;
      const newReply = {id: Date.now(), text: val, votes:0, replies:[]};
      c.replies.push(newReply);
      if(Math.random()<0.5){
        c.replies.push({id: Date.now()+1, text:"🤖 AI小建議："+aiCommentsPool[Math.floor(Math.random()*aiCommentsPool.length)], votes:0, replies:[]});
      }
      saveLocal();
      updateNetworkComments();
      displayComments();
    };
    replyBox.appendChild(textarea);
    replyBox.appendChild(btn);
    div.appendChild(replyBox);

    parentDiv.appendChild(div);

    if(c.replies.length>0){
      renderComments(parentDiv, c.replies);
    }
  });
}

// 顯示留言
function displayComments(){
  const container = document.getElementById("commentsContainer");
  container.innerHTML="";
  renderComments(container, comments);
}

// 留言隨機變色
setInterval(()=>{
  document.querySelectorAll(".comment").forEach(div=>{
    div.style.background = colors[Math.floor(Math.random()*colors.length)];
  });
}, 10000);

// 整個背景隨機變色
setInterval(()=>{
  document.body.style.background = bgColors[Math.floor(Math.random()*bgColors.length)];
}, 10000);

// 初始載入
fetchNetworkComments();
displayComments();
</script>
